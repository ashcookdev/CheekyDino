type HomePage @model @auth(rules: [{allow: private}]) {
  id: ID!
  Message: String
  Number: Int
}

type CustomerScreen @model @auth(rules: [{allow: private}, {allow: owner}]) {
  id: ID!
  Message: String
  Show: Boolean
  Number: Int
}

type Extras @model @auth(rules: [{allow: private}]) {
  id: ID!
  Name: String
  Price: Float
  Kitchen: Boolean
}

type Breakfast @model @auth(rules: [{allow: private}]) {
