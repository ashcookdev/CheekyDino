}

type TimeEntry @model @auth(rules: [{allow: private}, {allow: owner}]) {
  id: ID!
  Staff: [Staff] @manyToMany(relationName: "TimeEntryStaff")
  StaffID: String
  ClockInTime: AWSTime
  ClockOutTime: AWSTime
  Hours: Float
  Date: AWSDate
  ShiftStart: String
  ShiftFinish: String
}

type Staff @model @auth(rules: [{allow: private}]) {
  id: ID!
  Name: String
  Email: String
  TimeEntries: String
  timeentriess: [TimeEntry] @manyToMany(relationName: "TimeEntryStaff")
  Role: String
}

type Confectionary @model @auth(rules: [{allow: private}, {allow: owner}]) {
  id: ID!
  Name: String
  Price: Float
  Kitchen: Boolean
}

type SoftDrinks @model @auth(rules: [{allow: private}, {allow: owner}]) {
  id: ID!
  Name: String
  Price: Float
  Kitchen: Boolean
}

type HotDrinks @model @auth(rules: [{allow: private}, {allow: owner}]) {
  id: ID!
  Name: String
